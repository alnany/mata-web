<!doctype html>
<html lang="en" class="h-full dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <title>Mata</title>
    <meta name="description" content="The eye of the day. Encrypted, end to end." />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- OpenGraph + Twitter card. The Matrix `preview_url` endpoint
         (and every other unfurler — Slack, iMessage, Telegram,
         Discord) reads these to render a link card. Without them
         our own Mata client returns a null preview and never shows
         the card, since the SPA's index.html is mostly empty. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mata" />
    <meta property="og:title" content="Mata" />
    <meta property="og:description" content="The eye of the day. Encrypted, end to end." />
    <meta property="og:url" content="https://immata.app/" />
    <meta property="og:image" content="https://immata.app/og-cover.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Mata — encrypted Matrix client" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mata" />
    <meta name="twitter:description" content="The eye of the day. Encrypted, end to end." />
    <meta name="twitter:image" content="https://immata.app/og-cover.jpg" />

    <!-- Theme bootstrap: applies persisted choice before the JS bundle
         loads so we never paint the wrong palette and then flip. -->
    <script>
      (function () {
        try {
          var v = localStorage.getItem('mata.theme');
          var isDark =
            v === 'dark' ||
            (v !== 'light' && (v === null || v === 'system'));
          var html = document.documentElement;
          html.classList.toggle('dark', isDark);
          html.classList.toggle('light', !isDark);
        } catch (e) {
          /* SSR / private mode fallback: assume dark (design default). */
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <!-- Fonts: Geist (UI), Geist Mono (metadata), Instrument Serif (the M
         glyph on the workspace-rail brand square).

         The Google Fonts stylesheet used to be a *blocking* <link
         rel="stylesheet">, which meant ~2 RTT (CSS fetch + WOFF2
         fetch) before any text could paint. Preload-as-style with
         a one-shot rel-flip avoids the render block; the font
         faces themselves still use `display=swap` so we never
         hide text waiting on the network. <noscript> fallback
         keeps fonts working with JS disabled. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body class="h-full antialiased">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
